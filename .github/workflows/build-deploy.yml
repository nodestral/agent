name: Build Agent Binary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o nodestral-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodestral-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nodestral-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        run: go test ./...
